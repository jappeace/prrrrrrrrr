on:
  pull_request:
  push:
    branches:
      - master

permissions:
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          sandbox = relaxed
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          extra-substituters = https://nix-cache.jappie.me
          extra-trusted-public-keys = nix-cache.jappie.me:WjkKcvFtHih2i+n7bdsrJ3HuGboJiU2hA2CZbf9I9oc=
    - name: Enable KVM for Android emulator
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm
    - name: Build (Haskell unit tests + Android library + APK)
      run: nix-build nix/ci.nix -A native -A android -A apk
    - name: Build UI test
      run: nix-build nix/emulator-ui.nix -o result-emulator-ui
    - name: Run UI test
      run: |
        # run_with_retry: up to 10 attempts, succeed on first pass,
        # fail only if all 10 fail.  If output contains "FATAL:" we
        # stop immediately (e.g. native library failed to load).
        max_attempts=10
        attempt=1
        log_file=$(mktemp /tmp/ui-retry-XXXX.log)
        while [ $attempt -le $max_attempts ]; do
            echo "[ui-test] attempt $attempt/$max_attempts"
            if ./result-emulator-ui/bin/test-ui 2>&1 | tee "$log_file"; then
                echo "[ui-test] PASSED on attempt $attempt"
                exit 0
            fi
            if grep -q "^FATAL:" "$log_file" 2>/dev/null; then
                echo "[ui-test] FATAL error detected — not retrying"
                exit 1
            fi
            echo "[ui-test] attempt $attempt FAILED"
            attempt=$((attempt + 1))
            if [ $attempt -le $max_attempts ]; then
                echo "[ui-test] retrying in 5s..."
                sleep 5
            fi
        done
        echo "[ui-test] FAILED after $max_attempts attempts"
        exit 1
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: cachix/install-nix-action@v31
      with:
        extra_nix_config: |
          sandbox = relaxed
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          extra-substituters = https://nix-cache.jappie.me
          extra-trusted-public-keys = nix-cache.jappie.me:WjkKcvFtHih2i+n7bdsrJ3HuGboJiU2hA2CZbf9I9oc=
    - name: Build iOS library (simulator)
      run: nix-build nix/ci.nix -A ios-simulator
    - name: Stage iOS Xcode project
      run: nix-build nix/ci.nix -A ios-app
    - name: Cancel workflow on failure
      if: failure()
      continue-on-error: true
      run: gh run cancel ${{ github.run_id }}
      env:
        GH_TOKEN: ${{ github.token }}
